[tool.black]
line-length = 100
target-version = ["py39"]
skip-string-normalization = true

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long — black handles this
    "B008",   # function calls in default args (Streamlit st.cache_data pattern)
    "SIM108", # ternary operator — readability preference
    "UP007",  # X | Y union type — Python 3.9 not supported
    "UP006",  # list/dict/tuple instead of List — Python 3.9 not supported
]

[tool.ruff.lint.isort]
known-first-party = ["src"]
force-sort-within-sections = true

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "F811"]
